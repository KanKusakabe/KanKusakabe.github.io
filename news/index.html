<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kan's News | Market & Tech Summary</title>
  
  <meta name="description" content="マクロ経済動向、日本情勢、各種テクノロジートレンドの解説サマリーです。">
  <meta name="keywords" content="Kan's News, マーケットニュース, テクノロジー, Zenn, Qiita, 日経">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f7fa',
              100: '#e4e8f0',
              200: '#c8d1e3',
              300: '#9eafd1',
              400: '#6d88bd',
              500: '#4865a1',
              600: '#374e84',
              700: '#2d3f6d',
              800: '#27345b',
              900: '#252e4d',
              950: '#14192b',
            }
          }
        }
      }
    }
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    .tab-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(226, 232, 240, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    html {
      scroll-behavior: smooth;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    .glow-bg {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(circle at 10% 10%, rgba(79, 70, 229, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 45%);
    }
  </style>
  <!-- Load the generated data -->
  <script src="./news_data.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col antialiased relative overflow-x-hidden">
  <div class="glow-bg"></div>

  <header class="glass-nav sticky top-0 z-30 border-b px-4 sm:px-6 lg:px-8 py-4 transition-all">
    <div class="max-w-[90rem] mx-auto flex items-center justify-between relative z-10">
      <div class="flex items-center gap-3">
        <a href="https://kankusakabe.github.io/Portfolio/ja" class="flex items-center gap-3 group">
          <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 text-white shadow-lg shadow-indigo-500/30 group-hover:scale-105 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />
            </svg>
          </div>
          <div>
            <h1 class="text-base sm:text-lg font-black text-slate-900 tracking-tight leading-none group-hover:text-indigo-600 transition-colors font-outfit">Kan's News</h1>
            <p class="text-[9px] sm:text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-widest font-outfit">Daily Intelligence Summary</p>
          </div>
        </a>
      </div>
      
      <div>
        <a 
          href="https://kankusakabe.github.io/Portfolio/ja" 
          class="inline-flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-semibold text-slate-600 bg-white hover:bg-slate-50 hover:text-indigo-600 border border-slate-200 hover:border-indigo-200 shadow-sm transition-all duration-200"
        >
          <span>ポートフォリオに戻る</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Market Overview Charts -->
  <div class="w-full bg-white/60 border-b border-slate-200/80 py-4 sm:py-6 relative z-10 backdrop-blur-sm">
    <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
      
      <!-- Chart Controls -->
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg sm:text-xl font-bold text-slate-800 flex items-center gap-2 tracking-wide font-outfit">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 3v18M18 3v18M12 1v22M9 7h6v10H9z" />
          </svg>
          主要マーケット指標
        </h3>
        <div class="flex bg-slate-100/80 p-0.5 rounded-lg border border-slate-200/80">
          <button id="btn-range-1W" onclick="updateChartRange('1W')" class="px-3 py-1 text-[10px] font-bold rounded-md text-slate-500 hover:text-slate-700 transition-colors font-outfit uppercase tracking-wider">1W</button>
          <button id="btn-range-1M" onclick="updateChartRange('1M')" class="px-3 py-1 text-[10px] font-bold rounded-md bg-white text-indigo-600 shadow-sm border border-slate-200/50 transition-all font-outfit uppercase tracking-wider">1M</button>
          <button id="btn-range-12M" onclick="updateChartRange('12M')" class="px-3 py-1 text-[10px] font-bold rounded-md text-slate-500 hover:text-slate-700 transition-colors font-outfit uppercase tracking-wider">1Y</button>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="mini-charts-container">
        <!-- Charts will be rendered here by JS -->
      </div>
    </div>
  </div>

  <main class="flex-1 max-w-[90rem] w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 relative z-10">
    
    <div class="mb-8 text-center sm:text-left">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[11px] font-bold bg-indigo-50 border border-indigo-100 text-indigo-600 mb-3 tracking-wider font-outfit uppercase">
        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
        Global Intelligence
      </div>
      <p class="text-xs font-bold tracking-widest text-indigo-600/80 uppercase mb-1.5 font-outfit">Global & Tech Insights for Japan</p>
      <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight leading-tight">
        News
      </h2>
      <div class="mt-4 flex flex-wrap items-center justify-center sm:justify-start gap-4 text-xs text-slate-500">
        <span class="flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="9" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2" />
          </svg>
          最終更新: <span id="update-time" class="font-semibold text-slate-600">読み込み中...</span>
        </span>
      </div>
    </div>

    <div class="bg-white/80 backdrop-blur-md rounded-2xl border border-slate-200 shadow-xl overflow-hidden mb-8">
      <div class="flex border-b border-slate-200 bg-slate-50/50 p-2 gap-1 sm:gap-2">
        <button id="tab-days" onclick="switchTab('days')" class="flex-1 sm:flex-none px-4 sm:px-8 py-3 text-sm font-semibold rounded-xl text-center transition-all duration-200 focus:outline-none text-slate-500 hover:text-slate-800 hover:bg-slate-200/50">最新ニュース</button>
        <button id="tab-week" onclick="switchTab('week')" class="flex-1 sm:flex-none px-4 sm:px-8 py-3 text-sm font-semibold rounded-xl text-center transition-all duration-200 focus:outline-none text-slate-500 hover:text-slate-800 hover:bg-slate-200/50">今週のトレンド</button>
      </div>

      <div class="p-6 sm:p-8">
        
        <div id="loading-state" class="py-20 flex flex-col items-center justify-center gap-4">
          <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-500 rounded-full animate-spin"></div>
          <p class="text-sm font-medium text-slate-500">ニュースデータを取得しています...</p>
        </div>

        <div id="error-state" class="hidden py-20 flex flex-col items-center justify-center text-center max-w-md mx-auto gap-4 p-6 bg-red-50 border border-red-100 rounded-2xl">
          <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center border border-red-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          </div>
          <div>
            <h3 class="text-base font-bold text-red-800">データの読み込みに失敗しました</h3>
            <p class="text-xs text-red-600/80 mt-1">データ生成スクリプトがまだ実行されていない可能性があります。</p>
          </div>
          <button onclick="loadNewsData()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-semibold rounded-lg transition shadow-sm border border-red-700/50">
            再読み込み
          </button>
        </div>

        <div id="news-content" class="hidden space-y-10">
          <!-- Content rendered dynamically by JS -->
        </div>
        
      </div>
    </div>

    <div class="bg-indigo-50/50 border border-indigo-100 rounded-2xl p-5 text-sm flex flex-col sm:flex-row gap-4 items-start backdrop-blur-sm">
      <div class="p-2 bg-indigo-100 border border-indigo-200 text-indigo-600 rounded-lg flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
        </svg>
      </div>
      <div>
        <h4 class="font-bold text-indigo-900">専門用語の自動解説機能</h4>
        <p class="text-slate-600 mt-1 leading-relaxed">
          要約記事内の <span class="border-b border-dashed border-indigo-500 text-indigo-600 font-semibold cursor-help">下線が引かれた言葉</span> をクリック・タップすると、用語のわかりやすい解説が下に表示されます。
        </p>
      </div>
    </div>

  </main>

  <div id="glossary-drawer" class="fixed inset-x-0 bottom-0 z-50 bg-white/98 backdrop-blur-xl border-t border-slate-200 shadow-[0_-20px_50px_rgba(0,0,0,0.1)] transform translate-y-full transition-transform duration-300 cubic-bezier(0.4, 0, 0.2, 1) flex flex-col max-h-[85vh] sm:max-h-[50vh]">
    <div class="mx-auto w-12 h-1.5 bg-slate-300 hover:bg-slate-400 rounded-full my-3 flex-shrink-0 cursor-pointer" onclick="closeGlossary()"></div>
    <div class="px-6 pb-6 overflow-y-auto max-w-3xl mx-auto w-full">
      <div class="flex items-center justify-between gap-4 mb-3">
        <h4 id="glossary-title" class="text-lg font-bold text-slate-900 border-l-4 border-indigo-500 pl-3">用語解説</h4>
        <button onclick="closeGlossary()" class="p-2 hover:bg-slate-100 text-slate-400 hover:text-slate-600 rounded-full transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <p id="glossary-definition" class="text-slate-600 leading-relaxed text-sm sm:text-base">
        ここに解説が表示されます。
      </p>
    </div>
  </div>

  <div id="drawer-overlay" class="fixed inset-0 z-40 bg-slate-900/40 opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeGlossary()"></div>

  <script>
    let newsData = null;
    let activeTab = 'days';

    document.addEventListener('DOMContentLoaded', () => {
      loadNewsData();
      renderMiniCharts();
    });

    async function loadNewsData() {
      showLoading(true);
      showError(false);
      try {
        if (window.newsData) {
          newsData = window.newsData;
        } else {
          const response = await fetch('./news_data.js?t=' + new Date().getTime());
          if (!response.ok) throw new Error('Failed to load JS script');
          const text = await response.text();
          const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
          newsData = JSON.parse(jsonText);
        }
        
        if (!newsData) throw new Error('Data is empty');
        
        document.getElementById('update-time').innerText = newsData.updated_at || '未設定';
        renderNews();
        showLoading(false);
      } catch (err) {
        console.error(err);
        showLoading(false);
        showError(true);
      }
    }

    function showLoading(show) {
      const el = document.getElementById('loading-state');
      if (show) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }

    function showError(show) {
      const el = document.getElementById('error-state');
      if (show) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }

    function switchTab(period) {
      activeTab = period;
      renderNews();
    }

    function renderNews() {
      if (!newsData) return;
      
      const periods = ['days', 'week'];
      periods.forEach(p => {
        const btn = document.getElementById(`tab-${p}`);
        if (!btn) return;
        if (p === activeTab) {
          btn.className = "flex-1 sm:flex-none px-6 py-2.5 text-xs font-bold rounded-xl text-center text-white bg-gradient-to-r from-indigo-500 to-violet-500 shadow-md shadow-indigo-500/20 border border-indigo-500/20 focus:outline-none font-outfit uppercase tracking-wider tab-transition";
        } else {
          btn.className = "flex-1 sm:flex-none px-6 py-2.5 text-xs font-semibold rounded-xl text-center text-slate-500 hover:text-slate-800 bg-transparent hover:bg-slate-200/50 border border-transparent focus:outline-none font-outfit uppercase tracking-wider tab-transition";
        }
      });

      const periodData = newsData.periods[activeTab];
      if (!periodData) return;

      const newsContent = document.getElementById('news-content');
      newsContent.innerHTML = '';
      newsContent.classList.remove('hidden');

      if (activeTab === 'days') {
        let gridHtml = '<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 sm:gap-8">';
        
        if (periodData.categories && Array.isArray(periodData.categories)) {
          periodData.categories.forEach(cat => {
            let topicsHtml = '';
            if (cat.topics && Array.isArray(cat.topics)) {
              cat.topics.forEach(topic => {
                const dateHtml = topic.date ? `<div class="text-[10px] text-slate-400 font-medium mb-1.5">${topic.date}</div>` : '';
                const headlineText = parseGlossaryTerms(topic.headline);
                const headlineHtml = topic.url 
                  ? `<a href="${topic.url}" target="_blank" class="hover:text-indigo-600 transition-colors inline-flex items-start gap-1 group"><span>${headlineText}</span><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-slate-400 group-hover:text-indigo-500 transition-colors mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg></a>`
                  : headlineText;

                topicsHtml += `
                  <div class="mb-5 last:mb-0 pb-5 last:pb-0 border-b last:border-0 border-slate-200">
                    ${dateHtml}
                    <h5 class="text-sm font-bold text-slate-800 mb-2 leading-relaxed font-sans">${headlineHtml}</h5>
                    <div class="space-y-3.5">
                      <p class="text-xs sm:text-[13px] leading-relaxed text-slate-600 font-normal font-sans">${parseGlossaryTerms(topic.content)}</p>
                      <div class="bg-indigo-50/50 border-l-2 border-indigo-400 p-3.5 rounded-r-lg">
                        <span class="text-[9px] font-bold text-indigo-600 uppercase tracking-widest mb-1.5 block font-outfit">Impact & Implications</span>
                        <p class="text-xs sm:text-[13px] leading-relaxed text-slate-600 font-normal font-sans">${parseGlossaryTerms(topic.impact)}</p>
                      </div>
                    </div>
                  </div>
                `;
              });
            }

            let iconColorClass = 'bg-slate-100 border-slate-200 text-slate-500';
            let iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            
            if (cat.genre === 'WORLD') {
              iconColorClass = 'bg-cyan-50 border-cyan-200 text-cyan-600';
              iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10" /><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10m0-20a15.3 15.3 0 00-4 10 15.3 15.3 0 004 10M2 12h20" /></svg>`;
            } else if (cat.genre === 'BUSINESS') {
               iconColorClass = 'bg-amber-50 border-amber-200 text-amber-600';
               iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18M18.5 12V7.5H15M21 5l-8.5 8.5-4-4L3 15" /></svg>`;
            } else if (cat.genre === 'TECHNOLOGY') {
               iconColorClass = 'bg-indigo-50 border-indigo-200 text-indigo-600';
               iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2" /><path stroke-linecap="round" stroke-linejoin="round" d="M9 9h6v6H9V9zM9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3" /></svg>`;
            } else if (cat.genre === 'SCIENCE') {
               iconColorClass = 'bg-fuchsia-50 border-fuchsia-200 text-fuchsia-600';
               iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="2" /><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-30 12 12)" /><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)" /></svg>`;
            } else if (cat.genre === 'DEVELOPER_TRENDS') {
               iconColorClass = 'bg-rose-50 border-rose-200 text-rose-600';
               iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l-4 3 4 3m8-6l4 3-4 3m-2-9l-4 12" /></svg>`;
            }

            gridHtml += `
              <section class="flex flex-col bg-white/90 border border-slate-200/80 rounded-xl p-5">
                <div class="flex items-center gap-2.5 mb-4 pb-3.5 border-b border-slate-100">
                  <span class="p-2 rounded-lg border ${iconColorClass}">
                    ${iconSvg}
                  </span>
                  <h3 class="text-sm sm:text-base font-bold text-slate-800 font-sans">${cat.title}</h3>
                </div>
                <div class="flex-1">
                  ${topicsHtml}
                </div>
              </section>
            `;
          });
        }
        gridHtml += '</div>';

        const summaryHtml = `
          <section class="relative border border-indigo-100 rounded-xl bg-gradient-to-br from-indigo-50/50 to-white text-slate-800 p-6 sm:p-8 shadow-sm overflow-hidden">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4 pb-4 border-b border-indigo-100">
              <div class="flex items-center gap-2.5">
                <span class="p-2 rounded-lg bg-indigo-100 border border-indigo-200 text-indigo-600">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </span>
                <h3 class="text-base font-bold text-indigo-950 font-outfit">本日の総括と注視ポイント</h3>
              </div>
              <div class="text-[10px] font-bold text-indigo-600 bg-white border border-indigo-200 px-3 py-1 rounded-full uppercase tracking-wider font-outfit">Outlook & Summary</div>
            </div>
            <p class="text-sm leading-relaxed text-slate-600 font-normal">${parseGlossaryTerms(periodData.summary?.content || "")}</p>
          </section>
        `;

        newsContent.innerHTML = gridHtml + summaryHtml;
      } else if (activeTab === 'week') {
        let trendsHtml = '';
        if (periodData.key_trends && Array.isArray(periodData.key_trends)) {
          periodData.key_trends.forEach(trend => {
            trendsHtml += `
              <div class="bg-white/80 border border-slate-200 rounded-xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <h4 class="text-base font-bold text-slate-800 mb-3 border-l-4 border-indigo-500 pl-3 leading-snug">${parseGlossaryTerms(trend.title)}</h4>
                <p class="text-sm text-slate-600 leading-relaxed">${parseGlossaryTerms(trend.analysis)}</p>
              </div>
            `;
          });
        }

        newsContent.innerHTML = `
          <div class="max-w-4xl mx-auto w-full space-y-8">
            <section class="bg-gradient-to-r from-indigo-900 to-slate-800 rounded-2xl p-8 sm:p-10 text-white shadow-xl relative overflow-hidden">
              <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
              <div class="relative z-10">
                <h3 class="text-2xl font-black mb-4 tracking-tight">Week in Review</h3>
                <p class="text-[15px] leading-relaxed text-indigo-100 font-medium">${parseGlossaryTerms(periodData.overview || "")}</p>
              </div>
            </section>
            
            <div class="space-y-4">
              <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2 px-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                注目すべきキートレンド
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                ${trendsHtml}
              </div>
            </div>
          </div>
        `;
      }

      attachGlossaryListeners();
    }

    function parseGlossaryTerms(text) {
      if (!text || !newsData.glossary) return text;
      
      let parsed = text;
      const sortedTerms = Object.keys(newsData.glossary).sort((a, b) => b.length - a.length);
      
      sortedTerms.forEach(term => {
        const escapedTerm = term.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        const regex = new RegExp(escapedTerm, 'g');
        
        parsed = parsed.split(term).map((part, index, arr) => {
          if (index === arr.length - 1) return part;
          return part + `<span class="glossary-trigger cursor-help border-b border-dashed border-indigo-400 text-indigo-600 hover:text-indigo-800 transition-colors font-medium font-sans" data-term="${term}">${term}</span>`;
        }).join('');
      });

      return parsed;
    }

    function attachGlossaryListeners() {
      const triggers = document.querySelectorAll('.glossary-trigger');
      triggers.forEach(el => {
        el.removeEventListener('click', handleGlossaryClick);
        el.addEventListener('click', handleGlossaryClick);
      });
    }

    function handleGlossaryClick(e) {
      const term = e.currentTarget.getAttribute('data-term');
      if (!term || !newsData.glossary[term]) return;

      document.getElementById('glossary-title').innerText = term;
      document.getElementById('glossary-definition').innerText = newsData.glossary[term];

      const drawer = document.getElementById('glossary-drawer');
      const overlay = document.getElementById('drawer-overlay');

      drawer.classList.remove('translate-y-full');
      overlay.classList.remove('opacity-0', 'pointer-events-none');
      overlay.classList.add('opacity-100');
    }

    function closeGlossary() {
      const drawer = document.getElementById('glossary-drawer');
      const overlay = document.getElementById('drawer-overlay');

      drawer.classList.add('translate-y-full');
      overlay.classList.remove('opacity-100');
      overlay.classList.add('opacity-0', 'pointer-events-none');
    }

    // Chart Configuration
    const chartSymbols = [
      { id: "INDEX:NKY", title: "日経平均" },
      { id: "OSE:TOPIX1!", title: "TOPIX" },
      { id: "FOREXCOM:SPXUSD", title: "S&P 500" },
      { id: "FOREXCOM:NSXUSD", title: "NASDAQ 100" }
    ];

    let currentChartRange = '1M';

    function renderMiniCharts() {
      const container = document.getElementById('mini-charts-container');
      if (!container) return;
      container.innerHTML = ''; 

      chartSymbols.forEach(chart => {
        const wrapper = document.createElement('div');
        wrapper.className = "bg-white/40 backdrop-blur-sm rounded-xl border border-slate-200/80 overflow-hidden h-36 relative hover:border-slate-300 transition-all duration-300";
        
        const pulse = document.createElement('div');
        pulse.className = "absolute inset-0 z-0 bg-slate-100/50 animate-pulse";
        wrapper.appendChild(pulse);

        const tvContainer = document.createElement('div');
        tvContainer.className = "tradingview-widget-container relative z-10";
        tvContainer.style.height = "100%";
        tvContainer.style.width = "100%";

        const widgetDiv = document.createElement('div');
        widgetDiv.className = "tradingview-widget-container__widget";
        widgetDiv.style.height = "calc(100% - 32px)";
        widgetDiv.style.width = "100%";
        tvContainer.appendChild(widgetDiv);

        const script = document.createElement('script');
        script.type = "text/javascript";
        script.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
        script.async = true;
        script.innerHTML = JSON.stringify({
          "symbol": chart.id,
          "width": "100%",
          "height": "100%",
          "locale": "ja",
          "dateRange": currentChartRange,
          "colorTheme": "light",
          "isTransparent": true,
          "autosize": true,
          "largeChartUrl": ""
        });

        tvContainer.appendChild(script);
        wrapper.appendChild(tvContainer);
        container.appendChild(wrapper);
      });

      ['1W', '1M', '12M'].forEach(range => {
        const btn = document.getElementById(`btn-range-${range}`);
        if (!btn) return;
        if (range === currentChartRange) {
          btn.className = "px-3 py-1 text-[10px] font-bold rounded-md bg-white text-indigo-600 shadow-sm border border-slate-200/50 transition-all font-outfit uppercase tracking-wider";
        } else {
          btn.className = "px-3 py-1 text-[10px] font-bold rounded-md text-slate-500 hover:text-slate-700 transition-colors font-outfit uppercase tracking-wider";
        }
      });
    }

    function updateChartRange(range) {
      if (currentChartRange === range) return;
      currentChartRange = range;
      renderMiniCharts();
    }
  </script>
</body>
</html>
