name: Generate Daily News

on:
  schedule:
    # 毎日日本時間 7:00 (UTC 22:00) に自動実行
    - cron: '0 22 * * *'
  workflow_dispatch: # GitHubの画面から手動で即時実行することも可能にします

permissions:
  contents: write # 生成したニュースデータをコミット＆プッシュするための書き込み権限

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "generate_news.py"

      - name: Run news generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          uv run generate_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/news_data.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: update daily news data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
